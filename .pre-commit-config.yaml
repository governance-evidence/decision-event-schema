repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: validate-decision-event-schema
        name: validate decision event schema examples
        entry: python tests/validate.py
        language: python
        additional_dependencies:
          - jsonschema>=4.20,<5
        pass_filenames: false